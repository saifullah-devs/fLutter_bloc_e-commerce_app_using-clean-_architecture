<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="this is a flutter e commerce app with bloc.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="e_commerce_bloc">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Clot E-commerce</title>
  <link rel="manifest" href="manifest.json">

  <style>
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #8E6CEF; /* Your Primary Purple */
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out; /* Smooth fade effect */
    }

    #splash-logo {
      width: 150px; /* Adjust size as needed */
      height: 150px;
    }
  </style>
</head>
<body>
  <div id="splash-screen">
    <img id="splash-logo" src="favicon.png" alt="Loading Clot..." />
  </div>
  <script>
    // Listen for Flutter to announce that the first frame is drawn
    window.addEventListener('flutter-first-frame', function() {
      var splash = document.getElementById('splash-screen');
      if (splash) {
        // Fade it out
        splash.style.opacity = '0';
        // Remove it completely after the fade animation (500ms)
        setTimeout(function() { splash.style.display = 'none'; }, 500);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
